version: "3.9"

services:
  # ── Next.js frontend (existing) ──
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - GHOST_SEARCH_URL=http://backend:8000
    depends_on:
      - backend

  # ── Ghost Search Python backend ──
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ghost_data:/app/data

volumes:
  ghost_data:
